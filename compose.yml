services:
  mysql:
    image: mysql:latest
    environment:
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - ./test/docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot && mysql -h 127.0.0.1 -uroot -proot -e 'SELECT 1 FROM testdb.employees LIMIT 1'"]
      start_period: 30s
      interval: 5s
      timeout: 3s
      retries: 30

  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: testdb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  pgloader:
    build: .
    depends_on:
      mysql:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: >
      pgloader mysql://root:root@mysql/testdb pgsql://postgres:postgres@postgres/testdb

  verify:
    image: postgres:18
    depends_on:
      pgloader:
        condition: service_completed_successfully
    environment:
      PGPASSWORD: postgres
    command: >
      sh -c '
        psql -h postgres -U postgres -d testdb -c "\dt" &&
        psql -h postgres -U postgres -d testdb -c "SELECT count(*) AS employee_count FROM employees;" &&
        psql -h postgres -U postgres -d testdb -c "SELECT count(*) AS dept_emp_count FROM dept_emp;"
      '
